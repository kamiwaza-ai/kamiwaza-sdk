services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - KAMIWAZA_API_URL=${KAMIWAZA_API_URL:-}
      - KAMIWAZA_PUBLIC_API_URL=${KAMIWAZA_PUBLIC_API_URL:-}
      - KAMIWAZA_ENDPOINT=${KAMIWAZA_ENDPOINT:-}
      - KAMIWAZA_USE_AUTH=${KAMIWAZA_USE_AUTH:-false}
      - KAMIWAZA_APP_NAME=${KAMIWAZA_APP_NAME:-{{name}}}
      - KAMIWAZA_VERIFY_SSL=${KAMIWAZA_VERIFY_SSL:-}
    volumes:
      - ./backend/app:/app/app
