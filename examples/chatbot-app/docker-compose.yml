services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # Host port auto-assigned by Docker — `3000:3000` collided with the
    # kind-cluster control plane on developer laptops running Kamiwaza
    # locally. `kz-ext dev local` still discovers the assigned host port
    # via `docker compose port`. (ENG-3889 P2 / §4.8)
    ports:
      - "3000"
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000"
    environment:
      - KAMIWAZA_API_URL=${KAMIWAZA_API_URL:-}
      - KAMIWAZA_PUBLIC_API_URL=${KAMIWAZA_PUBLIC_API_URL:-}
      - KAMIWAZA_ENDPOINT=${KAMIWAZA_ENDPOINT:-}
      - KAMIWAZA_USE_AUTH=${KAMIWAZA_USE_AUTH:-false}
      - KAMIWAZA_APP_NAME=${KAMIWAZA_APP_NAME:-chatbot-app}
      - KAMIWAZA_APP_URL=${KAMIWAZA_APP_URL:-http://localhost:3000}
      - KAMIWAZA_API_KEY=${KAMIWAZA_API_KEY:-}
      - KAMIWAZA_VERIFY_SSL=${KAMIWAZA_VERIFY_SSL:-}
    volumes:
      - ./backend/app:/app/app
