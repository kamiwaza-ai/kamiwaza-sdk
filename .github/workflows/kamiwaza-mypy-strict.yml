name: Kamiwaza Package mypy --strict

# T5.12 / ENG-4683 — strict type-check gate scoped to the new federation-aware
# kamiwaza/ package introduced in T5.1+. The legacy kamiwaza_sdk/ +
# kamiwaza_client/ packages remain on the existing permissive mypy config in
# .github/workflows/python-mypy.yml — they predate the strict requirement and
# tightening them is out of scope for WS-M1.
#
# Security: this workflow uses no untrusted user-controlled inputs in any
# `run:` step — only static commands (`uv sync`, `uv run mypy --strict`).

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'kamiwaza/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/kamiwaza-mypy-strict.yml'

permissions:
  contents: read

jobs:
  strict-type-check:
    name: Mypy Strict (kamiwaza/)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.7.5"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run mypy --strict on kamiwaza/
        # --follow-imports=silent keeps strict checking scoped to the
        # kamiwaza/ package itself. Post-WS-M3.2 the kamiwaza/ modules
        # are thin re-exports from kamiwaza_sdk/, so transitively
        # following imports would surface (and fail on) untyped legacy
        # services that predate the strict requirement. Per design
        # v0.3.7 §4.2.11, the strict gate is on the federation-aware
        # surface, not on the legacy service modules.
        run: uv run mypy --strict --follow-imports=silent kamiwaza/
