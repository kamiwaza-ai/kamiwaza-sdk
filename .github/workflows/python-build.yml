name: Python Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'kamiwaza_sdk/**'
      - 'kamiwaza_client/**'
      - 'kamiwaza_extensions/**'
      - 'kamiwaza_extensions_lib/**'
      - 'kamiwaza-ai-extensions-lib/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'MANIFEST.in'
      - 'release.sh'
      - '.github/workflows/python-build.yml'

permissions:
  contents: read

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.7.5"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Build SDK package
        run: uv build --package kamiwaza-sdk --out-dir dist/sdk

      - name: Build extensions-lib package
        run: uv build --package kamiwaza-extensions-lib --out-dir dist/lib

      - name: Verify SDK wheel contents
        run: |
          echo "SDK artifacts:"
          ls -la dist/sdk/

          echo ""
          echo "SDK wheel contents (sample):"
          unzip -l dist/sdk/*.whl | grep -E "(kamiwaza_sdk|kamiwaza_client|kamiwaza_extensions)" | head -20

          # Verify SDK packages are present
          for pkg in kamiwaza_sdk kamiwaza_client kamiwaza_extensions; do
            if ! unzip -l dist/sdk/*.whl | grep -q "${pkg}/"; then
              echo "::error::${pkg} not found in SDK wheel"
              exit 1
            fi
          done

          # Verify the lib is NOT bundled in the SDK wheel
          if unzip -l dist/sdk/*.whl | grep -q "kamiwaza_extensions_lib/"; then
            echo "::error::kamiwaza_extensions_lib leaked into SDK wheel — should be a separate distribution"
            exit 1
          fi

          # Verify SDK still pins lib at runtime
          if ! unzip -p dist/sdk/*.whl kamiwaza_sdk-*.dist-info/METADATA | grep -q "^Requires-Dist: kamiwaza-extensions-lib"; then
            echo "::error::SDK wheel METADATA missing Requires-Dist for kamiwaza-extensions-lib"
            exit 1
          fi

          echo "SDK wheel verification passed"

      - name: Verify extensions-lib wheel contents
        run: |
          echo "Lib artifacts:"
          ls -la dist/lib/

          echo ""
          echo "Lib wheel contents:"
          unzip -l dist/lib/*.whl

          # The lib must include its top-level package and middleware subpackage
          for path in kamiwaza_extensions_lib/__init__.py kamiwaza_extensions_lib/middleware/__init__.py kamiwaza_extensions_lib/local_dev.py kamiwaza_extensions_lib/py.typed kamiwaza_extensions_lib/exception_names.json; do
            if ! unzip -l dist/lib/*.whl | grep -q "${path}\b"; then
              echo "::error::lib wheel missing required path: ${path}"
              exit 1
            fi
          done

          # Apache-2.0 obligation: license text must ship in the dist
          if ! unzip -l dist/lib/*.whl | grep -q "dist-info/licenses/LICENSE"; then
            echo "::error::lib wheel missing LICENSE file"
            exit 1
          fi

          echo "Lib wheel verification passed"

      - name: Smoke-test extensions-lib in clean venv (no SDK installed)
        run: |
          # The lib must be importable WITHOUT kamiwaza-sdk so users who
          # only need the runtime helpers (auth middleware, model client)
          # are not forced to pull in the full SDK.
          python -m venv /tmp/lib-smoke
          /tmp/lib-smoke/bin/pip install --quiet "$GITHUB_WORKSPACE"/dist/lib/*.whl
          # Run from a directory OUTSIDE the checkout. Otherwise sys.path[0]
          # is "" (the repo root) and `import kamiwaza_extensions_lib` resolves
          # to the source tree before the installed wheel — masking missing
          # files in the wheel itself. Run from /tmp so only site-packages is
          # on sys.path.
          cd /tmp
          /tmp/lib-smoke/bin/python - <<'PY'
          import kamiwaza_extensions_lib
          import kamiwaza_extensions_lib.middleware  # noqa: F401
          import kamiwaza_extensions_lib.local_dev as ld
          # Sanity check: the loaded module must come from the installed wheel
          # (site-packages), not from a checkout that leaked onto sys.path.
          assert "site-packages" in kamiwaza_extensions_lib.__file__, (
              f"lib resolved from {kamiwaza_extensions_lib.__file__}, "
              f"expected site-packages — sys.path is contaminated"
          )
          print(f"lib version: {kamiwaza_extensions_lib.__version__}")
          # `prepare_bridge_context` lazy-imports kamiwaza_extensions; without
          # the SDK, calling it should raise LocalDevAuthError with an
          # actionable message rather than ModuleNotFoundError.
          try:
              ld.prepare_bridge_context()
          except ld.LocalDevAuthError as exc:
              assert "pip install kamiwaza-sdk" in str(exc), exc
              print("lazy-import error path is actionable: OK")
          else:
              raise SystemExit("expected LocalDevAuthError in clean venv without SDK")
          PY

      - name: Smoke-test release.sh end-to-end (--build-only)
        run: |
          # Exercises the npm portion of the release pipeline that the
          # Python-only build steps above don't touch. Catches regressions
          # like a missing committed lockfile, broken `npm ci`, or stale
          # release.sh logic. We rebuild from scratch so this is a true
          # fresh-clone simulation.
          rm -rf dist/sdk dist/lib kamiwaza-ai-extensions-lib/dist kamiwaza-ai-extensions-lib/*.tgz
          ./release.sh --build-only

          # Confirm all three artifacts landed
          test -f dist/sdk/*.whl || (echo "::error::SDK wheel missing after release.sh --build-only"; exit 1)
          test -f dist/lib/*.whl || (echo "::error::lib wheel missing after release.sh --build-only"; exit 1)
          test -f kamiwaza-ai-extensions-lib/*.tgz || (echo "::error::npm tarball missing after release.sh --build-only"; exit 1)

          # Sanity check: README ships in the npm tarball
          if ! tar tzf kamiwaza-ai-extensions-lib/*.tgz | grep -q "package/README.md$"; then
            echo "::error::npm tarball missing README.md"
            exit 1
          fi

          # Sanity check: LICENSE ships in the npm tarball
          if ! tar tzf kamiwaza-ai-extensions-lib/*.tgz | grep -q "package/LICENSE$"; then
            echo "::error::npm tarball missing LICENSE"
            exit 1
          fi

          echo "release.sh --build-only verification passed"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
