name: Python Type Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/python-mypy.yml'

permissions:
  contents: read

jobs:
  type-check:
    name: Mypy Type Check
    runs-on: ubuntu-latest
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.7.5"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Get changed Python files
        id: changed-files
        run: |
          CHANGED_FILES=$(git diff --name-only --diff-filter=AM "$BASE_SHA"..HEAD | grep '\.py$' | grep -v __pycache__ | grep '^kamiwaza_sdk/' || true)
          if [ -z "$CHANGED_FILES" ]; then
            echo "No source files changed"
            echo "files=" >> "$GITHUB_OUTPUT"
          else
            echo "Changed source files:"
            echo "$CHANGED_FILES"
            CHANGED_FILES_SPACE=$(echo "$CHANGED_FILES" | tr '\n' ' ')
            echo "files=$CHANGED_FILES_SPACE" >> "$GITHUB_OUTPUT"
          fi

      - name: Run mypy
        if: steps.changed-files.outputs.files != ''
        env:
          FILES: ${{ steps.changed-files.outputs.files }}
        # --follow-imports=silent matches the workflow's existing changed-
        # files filter intent: type-check only the PR's modified files.
        # Without it, mypy follows imports transitively and surfaces pre-
        # existing legacy errors that the changed-files filter was already
        # meant to exclude.
        #
        # Allowlist: pre-existing type debt tracked in separate refactor
        # tickets. Each grandfathered entry references the ticket that
        # retires it. See v1.0 Bug Fixes in Linear for the active work.
        run: |
          GRANDFATHERED=(
            # ENG-5323: storage_host widens base CreateModelFile.str -> Optional[str]
            "kamiwaza_sdk/schemas/models/model_file.py"
          )

          is_grandfathered() {
            local f="$1"
            for g in "${GRANDFATHERED[@]}"; do
              [ "$f" = "$g" ] && return 0
            done
            return 1
          }

          CHECK_FILES=()
          for file in $FILES; do
            if is_grandfathered "$file"; then
              echo "::notice::Skipping $file (grandfathered; tracked in v1.0 Bug Fixes)"
              continue
            fi
            CHECK_FILES+=("$file")
          done

          if [ ${#CHECK_FILES[@]} -eq 0 ]; then
            echo "All changed files are grandfathered; nothing to type-check"
            exit 0
          fi

          uv run mypy --follow-imports=silent "${CHECK_FILES[@]}"

      - name: No source files to check
        if: steps.changed-files.outputs.files == ''
        run: echo "No source files changed - skipping type check"
